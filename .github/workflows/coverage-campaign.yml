name: Coverage Campaign

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - docs/_build/**
      - data/logs/**
      - "**/__pycache__/**"
  pull_request:
    paths-ignore:
      - docs/_build/**
      - data/logs/**
      - "**/__pycache__/**"
  workflow_dispatch:

concurrency:
  group: coverage-campaign-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONIOENCODING: utf-8
      MPLBACKEND: Agg
      QT_QPA_PLATFORM: offscreen
      PYTHONPATH: ${{ github.workspace }}
      NUMBA_DISABLE_JIT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Qt system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libegl1 \
            libxkbcommon0 \
            libglib2.0-0 \
            libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run full test campaign with coverage
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p data/logs
          set +e
          python -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:data/logs/coverage.xml \
            -q 2>&1 | tee data/logs/coverage_report.txt
          PYTEST_EXIT=${PIPESTATUS[0]}
          echo "$PYTEST_EXIT" > data/logs/pytest_exit_code.txt
          if [ "$PYTEST_EXIT" -ne 0 ]; then
            echo "pytest exited with code $PYTEST_EXIT. Coverage report tail:"
            tail -n 50 data/logs/coverage_report.txt || true
          fi
          exit "$PYTEST_EXIT"

      - name: Extract total coverage percentage
        if: always()
        run: |
          python - << 'PY'
          import re
          from pathlib import Path

          xml_path = Path("data/logs/coverage.xml")
          summary_path = Path("data/logs/coverage_summary.txt")

          if not xml_path.exists():
              summary_path.write_text("TOTAL_COVERAGE_PCT:unavailable\n", encoding="utf-8")
              print("TOTAL_COVERAGE_PCT:unavailable")
              raise SystemExit(0)

          text = xml_path.read_text(encoding="utf-8", errors="replace")
          m = re.search(r'line-rate="([0-9.]+)"', text)
          if not m:
              summary_path.write_text("TOTAL_COVERAGE_PCT:unavailable\n", encoding="utf-8")
              print("TOTAL_COVERAGE_PCT:unavailable")
              raise SystemExit(0)

          pct = round(float(m.group(1)) * 100.0, 2)
          line = f"TOTAL_COVERAGE_PCT:{pct}"
          summary_path.write_text(line + "\n", encoding="utf-8")
          print(line)
          PY

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-campaign-artifacts
          path: |
            data/logs/coverage.xml
            data/logs/coverage_report.txt
            data/logs/coverage_summary.txt
          if-no-files-found: warn
