[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
check_untyped_defs = True
no_implicit_optional = False
warn_redundant_casts = False
warn_unused_ignores = False
warn_no_return = True
strict_equality = True
pretty = True
show_error_codes = True
ignore_missing_imports = True
exclude = ^(docs/|data/|examples/)

[mypy-src.ui.*]
# PyQt6 stub coverage is incomplete; attr-defined / arg-type errors are
# spurious for signal/slot and Qt enum accesses.  Full enforcement requires
# either PyQt6-stubs or a major annotation pass.  Track in a dedicated issue.
# TODO: replace ignore_errors with targeted disable_error_code once stubs
#       cover QWidget, QLabel, QComboBox, and Qt enums.
ignore_errors = True

[mypy-src.visualization.*]
# Fully typed — no suppression.  Verified clean as of 2026-03-31.

[mypy-tests.*]
ignore_errors = True

[mypy-PyQt6.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-numba.*]
ignore_missing_imports = True

[mypy-pyttsx3.*]
ignore_missing_imports = True
