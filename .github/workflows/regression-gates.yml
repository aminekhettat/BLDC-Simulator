name: Regression Gates

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QT_QPA_PLATFORM: offscreen
      MPLBACKEND: Agg
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Enforce baseline rationale on PR
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          CHANGED_BASELINES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^tests/baselines/(reference_baseline|foc_reference_baseline)\.json$' || true)
          if [ -z "$CHANGED_BASELINES" ]; then
            echo "No baseline JSON changes detected."
            exit 0
          fi

          echo "Baseline files changed:"
          echo "$CHANGED_BASELINES"

          python -c "import json, os, sys; payload=json.load(open(os.environ['GITHUB_EVENT_PATH'], encoding='utf-8')); body=(payload.get('pull_request', {}).get('body') or '').lower(); required_markers=['baseline rationale','drift evidence']; missing=[m for m in required_markers if m not in body]; print('PR body is missing required baseline documentation markers:') if missing else None; [print(f'- {m}') for m in missing]; print('\\nPlease complete .github/PULL_REQUEST_TEMPLATE.md sections.') if missing else None; sys.exit(1) if missing else None; print('Baseline rationale markers found in PR body.')"

      - name: Run baseline integrity and regression gates
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p ci_diagnostics
          set +e
          python -m pytest tests/test_baseline_integrity.py tests/test_regression_baseline.py tests/test_regression_baseline_foc.py -vv > ci_diagnostics/pytest_regression.log 2>&1
          PYTEST_EXIT=$?
          echo "$PYTEST_EXIT" > ci_diagnostics/pytest_exit_code.txt
          if [ "$PYTEST_EXIT" -ne 0 ]; then
            echo "Regression gate failed. Tail of pytest log:"
            tail -n 200 ci_diagnostics/pytest_regression.log || true
          fi
          exit "$PYTEST_EXIT"

      - name: Generate drift report artifact
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p ci_diagnostics
          set +e
          python ./examples/report_regression_drift.py > regression_drift_report.txt 2> ci_diagnostics/drift_report_stderr.log
          DRIFT_EXIT=$?
          echo "$DRIFT_EXIT" > ci_diagnostics/drift_report_exit_code.txt
          if [ "$DRIFT_EXIT" -ne 0 ]; then
            python - <<'PY' > ci_diagnostics/drift_report_traceback.log 2>&1
import traceback
from examples.report_regression_drift import main

try:
    main()
except Exception:
    traceback.print_exc()
    raise
PY
            echo "Drift report generation failed. Tail of stderr:"
            tail -n 200 ci_diagnostics/drift_report_stderr.log || true
          fi
          exit "$DRIFT_EXIT"

      - name: Evaluate startup transition KPI thresholds
        run: |
          python -c "from pathlib import Path; from src.utils.regression_baseline import evaluate_startup_transition_thresholds, format_startup_threshold_report, run_foc_startup_transition_diagnostics; diag=run_foc_startup_transition_diagnostics(); rows=evaluate_startup_transition_thresholds(diag); summary=format_startup_threshold_report(rows); Path('startup_transition_thresholds.txt').write_text(summary + '\n', encoding='utf-8'); print(summary); fail_rows=[r for r in rows if r['status']=='fail']; warn_rows=[r for r in rows if r['status']=='warn']; print(f'\nStartup threshold status: fail={len(fail_rows)}, warn={len(warn_rows)}'); raise SystemExit(1 if fail_rows else 0)"

      - name: Generate baseline governance summary artifact
        if: always()
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          SUMMARY_FILE=baseline_governance_summary.txt
          {
            echo "Baseline Governance Summary"
            echo "==========================="
            echo "event: ${GITHUB_EVENT_NAME}"
            echo "head_sha: ${HEAD_SHA}"
          } > "$SUMMARY_FILE"

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            CHANGED_BASELINES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^tests/baselines/(reference_baseline|foc_reference_baseline)\.json$' || true)
            if [ -z "$CHANGED_BASELINES" ]; then
              echo "baseline_json_changed: no" >> "$SUMMARY_FILE"
            else
              echo "baseline_json_changed: yes" >> "$SUMMARY_FILE"
              echo "changed_files:" >> "$SUMMARY_FILE"
              echo "$CHANGED_BASELINES" | sed 's/^/  - /' >> "$SUMMARY_FILE"
            fi

            python -c "import json, os; payload=json.load(open(os.environ['GITHUB_EVENT_PATH'], encoding='utf-8')); body=(payload.get('pull_request', {}).get('body') or '').lower(); markers=['baseline rationale','drift evidence']; print('pr_body_markers:'); [print(f\"  - {m}: {'yes' if m in body else 'no'}\") for m in markers]" >> "$SUMMARY_FILE"
          else
            echo "baseline_json_changed: n/a (not a pull_request event)" >> "$SUMMARY_FILE"
            echo "pr_body_markers: n/a (not a pull_request event)" >> "$SUMMARY_FILE"
          fi

      - name: Upload drift report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-drift-report
          path: |
            regression_drift_report.txt
            ci_diagnostics/pytest_regression.log
            ci_diagnostics/pytest_exit_code.txt
            ci_diagnostics/drift_report_stderr.log
            ci_diagnostics/drift_report_traceback.log
            ci_diagnostics/drift_report_exit_code.txt
            startup_transition_thresholds.txt
            baseline_governance_summary.txt
            tests/baselines/reference_baseline.json
            tests/baselines/foc_reference_baseline.json
          if-no-files-found: warn
