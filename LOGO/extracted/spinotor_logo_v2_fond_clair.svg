  <!-- Arc 1 -->
  <path d="M130,50 A60,60 0 0 1 182,108" fill="none" stroke="#534AB7" stroke-width="7" stroke-linecap="round"/>
  <!-- Arc 2 -->
  <path d="M182,108 A60,60 0 0 1 130,166" fill="none" stroke="#534AB7" stroke-width="7" stroke-linecap="round"/>
  <!-- Arc 3 -->
  <path d="M130,166 A60,60 0 0 1 78,108" fill="none" stroke="#534AB7" stroke-width="7" stroke-linecap="round"/>
  <!-- Pointe de flèche -->
  <polygon points="130,50 120,67 140,67" fill="#534AB7" transform="rotate(-28,130,50)"/>
