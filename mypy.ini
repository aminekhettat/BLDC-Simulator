[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
check_untyped_defs = True
no_implicit_optional = False
warn_redundant_casts = False
warn_unused_ignores = False
warn_no_return = True
strict_equality = True
pretty = True
show_error_codes = True
ignore_missing_imports = True
exclude = ^(docs/|data/|examples/)

[mypy-src.ui.*]
# Fully typed — verified clean as of 2026-03-31.

[mypy-src.visualization.*]
# Fully typed — no suppression.  Verified clean as of 2026-03-31.

[mypy-tests.*]
# Fully typed — verified clean as of 2026-03-31.

[mypy-PyQt6.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-numba.*]
ignore_missing_imports = True

[mypy-pyttsx3.*]
ignore_missing_imports = True
