<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Icône application 256x256 -->
  <!-- Fond carré arrondi violet -->
  <rect x="0" y="0" width="256" height="256" rx="40" fill="#534AB7"/>
  <!-- Hexagone centré, grande taille -->
  <polygon points="128,28 210,73 210,163 128,208 46,163 46,73" fill="#534AB7" stroke="#7F77DD" stroke-width="2"/>
  <!-- Arcs rotation épais -->
  <path d="M128,56 A72,72 0 0 1 190,116" fill="none" stroke="#EEEDFE" stroke-width="10" stroke-linecap="round"/>
  <path d="M190,116 A72,72 0 0 1 128,176" fill="none" stroke="#EEEDFE" stroke-width="10" stroke-linecap="round"/>
  <path d="M128,176 A72,72 0 0 1 66,116"  fill="none" stroke="#EEEDFE" stroke-width="10" stroke-linecap="round"/>
  <!-- Pointe de flèche -->
  <polygon points="128,56 116,76 140,76" fill="#EEEDFE" transform="rotate(-28,128,56)"/>
  <!-- Hub central -->
  <circle cx="128" cy="116" r="13" fill="#EEEDFE"/>
  <!-- Texte SPINOTOR en bas du carré -->
  <text x="128" y="236" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="22" font-weight="700"
        letter-spacing="6" fill="#EEEDFE">SPINOTOR</text>
</svg>
